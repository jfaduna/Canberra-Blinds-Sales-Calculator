<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cost Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; font-size: 1.1rem; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        .result { font-weight: bold; color: #2c3e50; background: #ecf0f1; padding: 10px; border-radius: 4px; }
        span.val { color: #e67e22; }
    </style>
</head>
<body>

    <h1>Product Calculator</h1>

    <div class="card">
        <h2>H / R / PG / VerB / VenB / Hc</h2>
        <input type="number" id="input1" placeholder="Enter Cost" oninput="calc1()">
        <div class="result">Total: $<span id="res1">0.00</span></div>
    </div>

    <div class="card">
        <h2>pvhc / SkyHC</h2>
        <input type="number" id="input2" placeholder="Enter Cost" oninput="calc2()">
        <div class="result">Total: $<span id="res2">0.00</span></div>
    </div>

    <div class="card">
        <h2>Double Roller</h2>
        <input type="number" id="input3" placeholder="Enter Cost" oninput="calc3()">
        <div class="result">Total: $<span id="res3">0.00</span></div>
    </div>

    <div class="card">
        <h2>Psh (Per Panel)</h2>
        <input type="number" id="input4_cost" placeholder="Enter Cost" oninput="calc4()">
        <input type="number" id="input4_panels" placeholder="Number of Panels" oninput="calc4()">
        <div class="result">Total: $<span id="res4">0.00</span></div>
    </div>

    <script>
        // Formula Logic: (Cost * 2.2 * 1.1 + Add-on) * 1.04
        
        function calc1() {
            let cost = document.getElementById('input1').value || 0;
            let total = (cost * 2.2 * 1.1 + 65) * 1.04;
            document.getElementById('res1').innerText = total.toFixed(2);
        }

        function calc2() {
            let cost = document.getElementById('input2').value || 0;
            let total = (cost * 2.2 * 1.1 + 150) * 1.04;
            document.getElementById('res2').innerText = total.toFixed(2);
        }

        function calc3() {
            let cost = document.getElementById('input3').value || 0;
            let total = (cost * 2.2 * 1.1 + 85) * 1.04;
            document.getElementById('res3').innerText = total.toFixed(2);
        }

        function calc4() {
            let cost = document.getElementById('input4_cost').value || 0;
            let panels = document.getElementById('input4_panels').value || 0;
            // Formula: (Cost * 2 * 1.1 + (70 * panels)) * 1.04
            let total = (cost * 2 * 1.1 + (70 * panels)) * 1.04;
            document.getElementById('res4').innerText = total.toFixed(2);
        }
    </script>
</body>
</html>
